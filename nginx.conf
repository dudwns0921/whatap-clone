server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Redirect bare /whatap-clone to /whatap-clone/
    rewrite ^/whatap-clone$ /whatap-clone/ permanent;

    # Strip /whatap-clone/ prefix so nginx serves files from document root
    rewrite ^/whatap-clone/(.*)$ /$1 last;

    # Long-term cache for hashed static assets
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
